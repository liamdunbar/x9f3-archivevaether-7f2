<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>remnant-002</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #0a0000 0%, #000000 80%);
  color: #ff4d4d;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.panel {
  width: 90%;
  max-width: 420px;
  border: 1px solid rgba(255,0,0,0.4);
  padding: 20px;
  background: rgba(10,0,0,0.9);
  box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

.header {
  font-size: 12px;
  opacity: 0.8;
  margin-bottom: 15px;
}

.content {
  opacity: 0.6;
  transition: 0.5s;
}

img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  display: block;
  margin-bottom: 10px;
  filter: blur(10px);
  transition: 0.6s;
}

.lock {
  margin-top: 20px;
  border-top: 1px solid rgba(255,0,0,0.3);
  padding-top: 10px;
}

input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid #ff4d4d;
  color: #ff4d4d;
  outline: none;
  padding: 6px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid #ff4d4d;
  color: #ff4d4d;
  font-family: monospace;
}

.system {
  font-size: 11px;
  margin-top: 10px;
}

.denied { color: red; }
.granted { color: #00ff9c; }

.back {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.7;
  border: none;
  text-align: left;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="panel">

  <div class="header">
    FILE: remnant-002<br>
    STATUS: RESTRICTED
  </div>

  <div class="content" id="content">
    <img src="../assets/1only.webp" id="img">

    <div id="name">Name: 1■■■■</div>
    <div id="user">Username: p■■■■■■■■</div>

    <div id="desc" style="margin-top:10px; font-size:12px;">
      Fragment detected... incomplete signal.
    </div>
  </div>

  <div class="lock">
    <input type="password" id="pass" placeholder="authorization key required">
    <button onclick="checkPass()">EXECUTE</button>
    <div id="msg" class="system"></div>
  </div>

  <button class="back" onclick="goBack()">← return</button>

</div>

<script>
const correct = "leftunsaid";

const input = document.getElementById("pass");
const msg = document.getElementById("msg");

function checkPass() {

  if (input.value === correct) {

    input.disabled = true;

    msg.textContent = "AUTHORIZING...";

    setTimeout(() => {
      msg.textContent = "DECRYPTING DATA...";
    }, 700);

    setTimeout(() => {
      msg.textContent = "LOADING RECORD...";
    }, 1400);

    setTimeout(() => {

      msg.textContent = "ACCESS GRANTED";
      msg.className = "system granted";

      document.getElementById("img").style.filter = "none";

      document.getElementById("name").textContent = "Name: 1only";
      document.getElementById("user").textContent = "Username: pengamenpodcast";

      document.getElementById("desc").innerHTML = `
        Record fully restored.<br><br>
        Subject exists within scattered traces.<br>
        Identity unstable but persistent.<br><br>
        Note: not erased — just fragmented.
      `;

    }, 2100);

  } else {
    msg.textContent = "ACCESS DENIED";
    msg.className = "system denied";
  }
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPass();
});

function goBack() {
  window.location.href = "https://simplefroylan.space";
}
</script>

</body>
</html>

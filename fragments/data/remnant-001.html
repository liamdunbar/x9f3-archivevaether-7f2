<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remnant Profile</title><style>
body {
  margin: 0;
  background: #050505;
  color: #ff3b3b;
  font-family: "Courier New", monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  border: 1px solid rgba(255,0,0,0.3);
  padding: 20px;
  box-shadow: 0 0 20px rgba(255,0,0,0.2);
  background: rgba(0,0,0,0.85);
}

.profile-img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 50%;
  display: block;
  margin: 0 auto 15px;
  border: 2px solid #ff3b3b;
  filter: blur(10px) brightness(0.6);
  transition: 0.5s;
}

h2, p {
  text-align: center;
  margin: 5px 0;
}

.desc {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}

.lock-box {
  margin-top: 20px;
  border-top: 1px solid rgba(255,0,0,0.3);
  padding-top: 15px;
  text-align: center;
}

input {
  width: 80%;
  padding: 8px;
  background: black;
  border: 1px solid #ff3b3b;
  color: #ff3b3b;
  outline: none;
}

button {
  margin-top: 10px;
  padding: 6px 12px;
  background: transparent;
  border: 1px solid #ff3b3b;
  color: #ff3b3b;
  cursor: pointer;
}

.error {
  color: red;
  font-size: 12px;
  margin-top: 8px;
}

/* Glitch Effect */
.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
}

.glitch::before {
  color: red;
  animation: glitch 0.5s infinite;
}

.glitch::after {
  color: white;
  animation: glitch 0.5s infinite reverse;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(-2px,-2px); }
  60% { transform: translate(2px,2px); }
  80% { transform: translate(2px,-2px); }
  100% { transform: translate(0); }
}

/* Typing effect */
.typing {
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid red;
  width: 0;
  animation: typing 3s steps(40, end) forwards;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

/* Access granted */
.access {
  color: #00ff9c;
  margin-top: 10px;
}

</style></head><body><div class="container">  <img src="satrya.webp" class="profile-img" id="profileImg">  <h2 class="glitch" data-text="S■■■■">S■■■■</h2>
  <p>@s◇◇◇◇</p>  <p class="desc typing" id="descText">
    He is someone who left a quiet mark... not loud, but lingering.
  </p>  <div class="lock-box">
    <p>🔒 Authorization Required</p>
    <input type="password" id="password" placeholder="Enter password">
    <br>
    <button onclick="checkPass()">ENTER</button>
    <p id="error" class="error"></p>
    <p id="access" class="access"></p>
  </div></div><script>
function checkPass() {
  const input = document.getElementById("password").value;
  const error = document.getElementById("error");
  const access = document.getElementById("access");
  const img = document.getElementById("profileImg");

  const correct = "remnant003";

  if (input === correct) {
    error.textContent = "";
    access.textContent = "ACCESS GRANTED";
    img.style.filter = "none";

    // subtle glitch flash
    document.body.style.background = "#001a12";
    setTimeout(() => {
      document.body.style.background = "#050505";
    }, 200);

  } else {
    error.textContent = "ACCESS DENIED";
    access.textContent = "";
  }
}
</script></body>
</html>

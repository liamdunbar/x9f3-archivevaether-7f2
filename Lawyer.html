<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>lawyer definition</title>

<style>
body{
  margin:0;
  padding:0;
  background:#f5f5f5;
  font-family:Georgia, "Times New Roman", serif;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:520px;
  height:520px;
  background:#fff;
  border:1px solid #ddd;
  padding:60px;

  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* WORD */
.word{
  font-size:72px;
  font-weight:bold;
}

/* PRONUNCIATION */
.pronounce{
  font-size:20px;
  margin-top:10px;
}

/* LINE */
.line{
  width:180px;
  height:1px;
  background:#000;
  margin:20px 0;
}

/* DEFINITION */
.definition{
  font-size:20px;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="box">

  <div class="word">lawyer</div>

  <div class="pronounce">[loi-er] noun</div>

  <div class="line"></div>

  <div class="definition">
    someone who does precision guesswork based on unreliable data 
    provided by those of questionable knowledge.
  </div>

</div>

</body>
</html>

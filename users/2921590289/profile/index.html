<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Roblox GutierrezFroy's Profile</title>

<meta name="description" content="GutierrezFroy is one of the millions creating and exploring the endless possibilities of Roblox. Join GutierrezFroy on Roblox and explore together!">
<meta property="og:title" content="Roblox GutierrezFroy's Profile">
<meta property="og:image" content="profile.webp">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#ff4d4d;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.03) 0px,
    transparent 2px
  );
  pointer-events:none;
}

.wrap{
  max-width:1000px;
  margin:auto;
}

/* ===== HEADER ===== */
.header{
  height:140px;
  background:url("header.webp") center/cover no-repeat;
  border-bottom:1px solid rgba(255,0,0,0.4);
  box-shadow:0 0 20px rgba(255,0,0,0.3);
}

/* ===== PROFILE ===== */
.profile{
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 20px;
  margin-top:-50px;
  flex-wrap:wrap;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid #ff0000;
  object-fit:cover;
  box-shadow:0 0 12px rgba(255,0,0,0.6);
}

/* text block */
.info{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.name{
  font-size:22px;
  text-shadow:0 0 8px #ff0000;
}

.username{
  font-size:13px;
  opacity:.7;
}

/* ===== BUTTONS FIXED ===== */
.actions{
  margin-left:auto;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.btn{
  border:1px solid #ff0000;
  padding:8px 12px;
  text-decoration:none;
  color:#ff4d4d;
  font-size:12px;
}

.btn:hover{
  background:#ff0000;
  color:#000;
  box-shadow:0 0 10px #ff0000;
}

/* ===== STATS ===== */
.stats{
  display:flex;
  gap:10px;
  padding:12px 20px;
  flex-wrap:wrap;
}

.stat{
  border:1px solid rgba(255,0,0,0.3);
  padding:5px 10px;
  font-size:12px;
}

/* ===== BIO ===== */
.bio{
  padding:0 20px;
  font-size:13px;
  opacity:.85;
}

/* ===== TABS ===== */
.tabs{
  display:flex;
  gap:30px;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,0,0,0.3);
}

.tab{
  opacity:.6;
}

.tab.active{
  opacity:1;
  border-bottom:2px solid #ff0000;
}

/* ===== FAVORITES (1:1 FIX) ===== */
.favorites{
  padding:20px;
}

.fav-title{
  font-size:16px;
  margin-bottom:14px;
  text-shadow:0 0 6px #ff0000;
}

.fav-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.fav-card{
  border:1px solid rgba(255,0,0,0.3);
  padding:6px;
  transition:.2s;
}

.fav-card:hover{
  box-shadow:0 0 10px #ff0000;
  transform:scale(1.03);
}

/* 🔥 PERFECT 1:1 */
.fav-card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border:1px solid rgba(255,0,0,0.4);
}

.fav-name{
  margin-top:6px;
  font-size:12px;
  text-align:center;
}

/* ===== DESKTOP ===== */
@media (min-width:700px){
  .fav-grid{
    grid-template-columns:repeat(3,1fr);
  }
}

.space{
  height:40px;
}

</style>
</head>

<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="header"></div>

  <!-- PROFILE -->
  <div class="profile">

    <img src="profile.webp" class="avatar">

    <div class="info">
      <div class="name">Froylan</div>
      <div class="username">@GutierrezFroy</div>
    </div>

    <div class="actions">
      <a class="btn" href="https://discord.gg/FfgJvX27GZ" target="_blank">
        Join His Server
      </a>

      <a class="btn" href="https://www.roblox.com/users/2921590289/profile" target="_blank">
        Add Friend
      </a>
    </div>

  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">43 Friends</div>
    <div class="stat">1 Follower</div>
    <div class="stat">0 Following</div>
  </div>

  <!-- BIO -->
  <div class="bio">
    don't say something you not willing to give it.
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">About</div>
    <div class="tab">Creations</div>
  </div>

  <!-- FAVORITES -->
  <div class="favorites">

    <div class="fav-title">Favorites ></div>

    <div class="fav-grid">

      <div class="fav-card">
        <img src="fav-h.webp">
        <div class="fav-name">H</div>
      </div>

      <div class="fav-card">
        <img src="fav-i.webp">
        <div class="fav-name">I</div>
      </div>

      <div class="fav-card">
        <img src="fav-k.webp">
        <div class="fav-name">K</div>
      </div>

      <div class="fav-card">
        <img src="fav-a.webp">
        <div class="fav-name">A</div>
      </div>

      <div class="fav-card">
        <img src="fav-r.webp">
        <div class="fav-name">R</div>
      </div>

      <div class="fav-card">
        <img src="fav-u.webp">
        <div class="fav-name">U</div>
      </div>

    </div>

  </div>

  <div class="space"></div>

</div>

</body>
</html>

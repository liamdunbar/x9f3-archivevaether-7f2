<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BIODATA</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#ff4d4d;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== CRT EFFECT ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.05) 0px,
    rgba(255,0,0,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* ===== CARD ===== */
.card{
  width:min(92vw, 380px);
  height:min(92vh, 680px);

  border:1px solid #ff0000;
  background:#050000;

  box-shadow:
    0 0 10px #ff0000,
    0 0 40px rgba(255,0,0,0.4),
    inset 0 0 60px rgba(255,0,0,0.15);

  padding:16px;

  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  letter-spacing:4px;
  margin-bottom:8px;
}

.small{
  font-size:10px;
  opacity:.6;
}

.title{
  font-size:22px;
  text-shadow:0 0 8px #ff0000;
}

/* ===== IMAGE ===== */
.profile-wrap{
  position:relative;
}

.profile{
  width:100%;
  height:150px;
  object-fit:cover;
  border:1px solid #ff0000;
}

/* ===== STICKER ===== */
.sticker{
  position:absolute;
  right:6px;
  bottom:-12px;
  width:65px;
  cursor:pointer;
  z-index:10;
  pointer-events:auto;
  transition:.2s;
}

.sticker:hover{
  transform:scale(1.1);
}

/* ===== CONTENT (SCROLL FIX) ===== */
.content{
  margin-top:10px;
  font-size:12px;

  flex:1;
  overflow-y:auto;   /* 🔑 SCROLL FIX */
  padding-right:4px;
}

/* ===== SCROLLBAR STYLE ===== */
.content::-webkit-scrollbar{
  width:4px;
}
.content::-webkit-scrollbar-thumb{
  background:#ff0000;
}

/* ===== ROW ===== */
.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid rgba(255,0,0,0.2);
}

.label{
  opacity:.6;
}

.value{
  text-align:right;
  max-width:60%;
}

/* ===== MESSAGE ===== */
.message{
  white-space:pre-wrap;
  line-height:1.6;
}

/* ===== BACK ===== */
.back{
  text-align:center;
  font-size:12px;
  margin-top:6px;
  cursor:pointer;
  opacity:.6;
}

.back:hover{
  opacity:1;
}

/* ===== PROTECTION ===== */
*{
  -webkit-user-select:none;
  user-select:none;
}

img{
  pointer-events:none;
}

.sticker{
  pointer-events:auto !important;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="small">[ CLASSIFIED FILE — UNAUTHORIZED VIEW ]</div>
    <div class="title">BIODATA</div>
  </div>

  <div class="profile-wrap">
    <img src="profile.jpg" class="profile">
    <img src="stickers.png" class="sticker" id="toggleBtn">
  </div>

  <!-- BIODATA -->
  <div class="content" id="biodata">
    <div class="row"><div class="label">Nama</div><div class="value">Froylán bukan mpruy</div></div>
    <div class="row"><div class="label">Zodiak</div><div class="value">Libra</div></div>

    <div class="row"><div class="label">Makanan</div><div class="value">Somebody Son's ass</div></div>
    <div class="row"><div class="label">Minuman</div><div class="value">Americano</div></div>
    <div class="row"><div class="label">Kesibukan</div><div class="value">tidur & gooning</div></div>

    <div class="row"><div class="label">Tanggal</div><div class="value">gatau lupa</div></div>
    <div class="row"><div class="label">Hobi</div><div class="value">ngehalu nyanyi ribut AI</div></div>

    <div class="row"><div class="label">Domisili</div><div class="value">Heisenberg</div></div>
    <div class="row"><div class="label">Rumah</div><div class="value">67 Six Seven</div></div>

    <div class="row"><div class="label">Rekening</div><div class="value">69 666 67</div></div>
    <div class="row"><div class="label">Pin</div><div class="value">ilfroy</div></div>
  </div>

  <!-- MESSAGE -->
  <div class="content message" id="message" style="display:none;"></div>

  <div class="back" onclick="window.location.href='https://simplefroylan.space'">
    ← return
  </div>

</div>

<script>

// block
document.addEventListener("contextmenu", e => e.preventDefault());

// message
const messageText = `I Just realized I'm not, I'm not even everyone's favorite friend.
People may tell me, I mean, a lot to them that I'm special.

But deep down I know there's always someone they'll choose over me.
Someone they talk to more someone, they run to first.
Someone they think of before.

And that's okay, even if it hurts sometimes.

I used to wonder what's wrong with me.
Why I'm never the first option, but now I understand that not being chosen
doesn't mean I'm not enough.

It just means people have their own people.

And that's something I can't control.

I still have a good heart.
I still care.
Deeply.

And even if I'm not their favorite,
I'll still be kind.

I don't need to be everyone's first choice
to know that I'm worth choosing.`;

// typing
let t;
function typeText(text){
  clearInterval(t);
  const el = document.getElementById("message");
  el.textContent = "";

  let i = 0;
  t = setInterval(()=>{
    el.textContent += text[i] || "";
    i++;
    if(i >= text.length) clearInterval(t);
  },15);
}

// toggle
let state = true;

document.getElementById("toggleBtn").onclick = () => {

  const bio = document.getElementById("biodata");
  const msg = document.getElementById("message");

  state = !state;

  if(state){
    bio.style.display = "block";
    msg.style.display = "none";
  } else {
    bio.style.display = "none";
    msg.style.display = "block";
    typeText(messageText);
  }

};

</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BIODATA — FILE</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020000;
  font-family:monospace;
  color:#ff4d4d;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== CARD ===== */
.card{
  width:min(92vw, 380px);
  aspect-ratio:9 / 16;

  background:#040000;
  border:1px solid #ff0000;

  box-shadow:
    0 0 25px rgba(255,0,0,0.4),
    inset 0 0 60px rgba(255,0,0,0.08);

  padding:16px;

  position:relative;
  overflow:hidden;
}

/* scan line */
.scan{
  position:absolute;
  width:100%;
  height:2px;
  background:rgba(255,0,0,0.3);
  top:0;
  animation:scanMove 4s linear infinite;
}

@keyframes scanMove{
  0%{top:0}
  100%{top:100%}
}

/* header */
.header{
  font-size:12px;
  opacity:0.6;
  margin-bottom:6px;
}

.title{
  text-align:center;
  font-size:22px;
  letter-spacing:6px;
  margin-bottom:10px;
}

/* image */
.img-wrap{
  position:relative;
}

.profile{
  width:100%;
  height:190px;
  object-fit:cover;
  border:1px solid #ff0000;
}

/* clickable sticker */
.sticker{
  position:absolute;
  right:-8px;
  bottom:-8px;
  width:85px;
  transform:rotate(-10deg);
  cursor:pointer;

  filter:drop-shadow(0 0 10px red);
}

/* content */
.content{
  margin-top:12px;
  font-size:12px;
  line-height:1.6;
  white-space:pre-wrap;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid rgba(255,0,0,0.2);
}

.label{
  opacity:0.5;
}

.value{
  text-align:right;
  max-width:55%;
}

/* back button */
.back{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
}

.back button{
  background:transparent;
  border:none;
  color:#ff4d4d;
  font-size:12px;
  cursor:pointer;
  opacity:0.7;
}

.back button:hover{
  opacity:1;
  text-decoration:underline;
}

/* CRT */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.04),
    rgba(255,0,0,0.04) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* block */
img{
  user-select:none;
  pointer-events:auto;
}
</style>
</head>

<body>

<div class="card">

  <div class="scan"></div>

  <div class="header">[ CLASSIFIED FILE — UNAUTHORIZED VIEW ]</div>

  <div class="title">BIODATA</div>

  <div class="img-wrap">
    <img src="profile.jpg" class="profile">
    <img src="stickers.png" class="sticker" onclick="toggleSecret()">
  </div>

  <!-- NORMAL DATA -->
  <div class="content" id="biodata">

    <div class="row"><div class="label">Nama</div><div class="value">Froylán bukan mpruy</div></div>
    <div class="row"><div class="label">Zodiak</div><div class="value">Libra</div></div>

    <div class="row"><div class="label">Makanan</div><div class="value">Somebody Son's ass</div></div>
    <div class="row"><div class="label">Minuman</div><div class="value">Americano</div></div>
    <div class="row"><div class="label">Kesibukan</div><div class="value">tidur & gooning</div></div>

    <div class="row"><div class="label">Tanggal</div><div class="value">gatau lupa</div></div>
    <div class="row"><div class="label">Hobi</div><div class="value">ngehalu nyanyi ribut AI</div></div>

    <div class="row"><div class="label">Domisili</div><div class="value">Heisenberg</div></div>
    <div class="row"><div class="label">Rumah</div><div class="value">67 Six Seven</div></div>

    <div class="row"><div class="label">Rekening</div><div class="value">69 666 67</div></div>
    <div class="row"><div class="label">Pin</div><div class="value">ilfroy</div></div>

  </div>

  <!-- SECRET TEXT -->
  <div class="content" id="secretText" style="display:none;"></div>

  <div class="back">
    <button onclick="goBack()">← return</button>
  </div>

</div>

<script>
function goBack(){
  window.location.href = "https://simplefroylan.space";
}

const message = `I Just realized I'm not, I'm not even everyone's favorite friend.
People may tell me, I mean, a lot to them that I'm special.

But deep down I know there's always someone they'll choose over me.
Someone they talk to more someone, they run to first.
Someone they think of before.

And that's okay, even if it hurts sometimes.

I used to wonder what's wrong with me.
Why I'm never the first option, but now I understand that not being chosen
doesn't mean I'm not enough.

It just means people have their own people.

And that's something I can't control.

I still have a good heart.
I still care deeply.

And even if I'm not their favorite,
I'll still be kind.

I don't need to be everyone's first choice
to know that I'm worth choosing.`;

let showingSecret = false;
let typingInterval = null;

function toggleSecret(){
  const bio = document.getElementById("biodata");
  const secret = document.getElementById("secretText");

  if(typingInterval){
    clearInterval(typingInterval);
    typingInterval = null;
  }

  if(!showingSecret){
    bio.style.display = "none";
    secret.style.display = "block";
    secret.textContent = "";

    let i = 0;

    typingInterval = setInterval(()=>{
      secret.textContent += message[i];
      i++;

      if(i >= message.length){
        clearInterval(typingInterval);
      }
    }, 18);

    showingSecret = true;

  } else {
    secret.style.display = "none";
    bio.style.display = "block";
    showingSecret = false;
  }
}

// block right click
document.addEventListener("contextmenu", e => e.preventDefault());

// block drag
document.addEventListener("dragstart", e => {
  if(e.target.tagName === "IMG"){
    e.preventDefault();
  }
});
</script>

</body>
</html>

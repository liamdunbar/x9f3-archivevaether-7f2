<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BIODATA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#030000;
  font-family:monospace;
  color:#ff4d4d;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== MAIN CARD ===== */
.card{
  width:min(92vw, 380px);
  aspect-ratio:9 / 16;

  background:#050000;
  border:1px solid #ff2a2a;

  box-shadow:
    0 0 10px #ff0000,
    inset 0 0 30px rgba(255,0,0,0.06);

  padding:16px;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  position:relative;
}

/* ===== TITLE ===== */
.title{
  text-align:center;
  font-size:20px;
  letter-spacing:4px;
  opacity:0.8;
}

/* ===== IMAGE SECTION ===== */
.img-section{
  position:relative;
  display:flex;
  justify-content:center;
}

.profile{
  width:85%;
  height:180px;
  object-fit:cover;
  border:1px solid #ff2a2a;
}

/* sticker attached */
.sticker{
  position:absolute;
  right:10%;
  bottom:-10px;
  width:70px;
  transform:rotate(-8deg);
  filter:drop-shadow(0 0 6px rgba(255,0,0,0.6));
}

/* ===== INFO GRID ===== */
.info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 12px;

  font-size:11px;
  line-height:1.5;
}

/* labels */
.label{
  opacity:0.6;
}

/* value */
.value{
  text-align:right;
}

/* divider line */
.line{
  grid-column:span 2;
  height:1px;
  background:rgba(255,0,0,0.2);
  margin:4px 0;
}

/* ===== BACK BUTTON ===== */
.back{
  text-align:center;
}

.back button{
  background:transparent;
  border:1px solid #ff2a2a;
  color:#ff4d4d;
  padding:5px 14px;
  cursor:pointer;
  font-family:monospace;

  transition:.2s;
}

.back button:hover{
  background:#ff0000;
  color:#000;
}

/* ===== CRT EFFECT ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.03),
    rgba(255,0,0,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* ===== BLOCK COPY ===== */
img{
  user-select:none;
  pointer-events:none;
  -webkit-user-drag:none;
}
</style>
</head>

<body>

<div class="card">

  <div class="title">BIODATA</div>

  <div class="img-section">
    <img src="profile.jpg" class="profile">
    <img src="stickers.png" class="sticker">
  </div>

  <div class="info">

    <div class="label">Nama</div>
    <div class="value">Froylán bukan mpruy</div>

    <div class="label">Zodiak</div>
    <div class="value">Libra</div>

    <div class="line"></div>

    <div class="label">Makanan</div>
    <div class="value">Somebody Son's ass</div>

    <div class="label">Minuman</div>
    <div class="value">Americano</div>

    <div class="label">Kesibukan</div>
    <div class="value">tidur & gooning</div>

    <div class="line"></div>

    <div class="label">Tanggal</div>
    <div class="value">gatau lupa</div>

    <div class="label">Hobi</div>
    <div class="value">ngehalu nyanyi ribut AI</div>

    <div class="line"></div>

    <div class="label">Domisili</div>
    <div class="value">Heisenberg</div>

    <div class="label">Rumah</div>
    <div class="value">67 Six Seven</div>

    <div class="label">Boneka</div>
    <div class="value">Teddy</div>

    <div class="line"></div>

    <div class="label">Ortu</div>
    <div class="value">g kenal</div>

    <div class="label">Rekening</div>
    <div class="value">69 666 67</div>

    <div class="label">Pw Email</div>
    <div class="value">123456789</div>

    <div class="label">Pin</div>
    <div class="value">ilfroy</div>

  </div>

  <div class="back">
    <button onclick="goBack()">← BACK</button>
  </div>

</div>

<script>
function goBack(){
  window.location.href = "index.html";
}

// block right click
document.addEventListener("contextmenu", e => e.preventDefault());

// block drag
document.addEventListener("dragstart", e => {
  if(e.target.tagName === "IMG"){
    e.preventDefault();
  }
});
</script>

</body>
</html>

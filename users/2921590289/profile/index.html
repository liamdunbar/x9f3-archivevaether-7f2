<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Roblox GutierrezFroy's Profile</title>

<meta name="description" content="GutierrezFroy is one of the millions creating and exploring the endless possibilities of Roblox. Join GutierrezFroy on Roblox and explore together!">
<meta property="og:title" content="Roblox GutierrezFroy's Profile">
<meta property="og:image" content="profile.webp">

<style>
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#ff4d4d;
}

/* subtle scanlines */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.03) 0px,
    transparent 2px
  );
  pointer-events:none;
}

.wrap{
  max-width:1000px;
  margin:auto;
}

/* HEADER */
.header{
  height:160px;
  background:url("header.webp") center/cover no-repeat;
  border-bottom:1px solid rgba(255,0,0,0.4);
}

/* PROFILE */
.profile{
  display:flex;
  align-items:flex-end;
  gap:16px;
  padding:0 20px;
  margin-top:-50px;
}

.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  border:2px solid #ff0000;
  object-fit:cover;
}

.name{
  font-size:24px;
  text-shadow:0 0 6px #ff0000;
}

.username{
  font-size:14px;
  opacity:.7;
}

/* BUTTONS */
.actions{
  margin-left:auto;
  display:flex;
  gap:10px;
}

.btn{
  border:1px solid #ff0000;
  padding:8px 14px;
  text-decoration:none;
  color:#ff4d4d;
  font-size:13px;
  white-space:nowrap;
}

.btn:hover{
  background:#ff0000;
  color:#000;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  padding:12px 20px;
  flex-wrap:wrap;
}

.stat{
  border:1px solid rgba(255,0,0,0.3);
  padding:5px 10px;
  font-size:12px;
}

/* BIO */
.bio{
  padding:0 20px;
  font-size:13px;
  opacity:.8;
}

/* TABS */
.tabs{
  display:flex;
  gap:30px;
  padding:16px 20px;
  border-bottom:1px solid rgba(255,0,0,0.3);
}

.tab{
  opacity:.6;
}

.tab.active{
  opacity:1;
  border-bottom:2px solid #ff0000;
}

/* FAVORITES */
.favorites{
  padding:20px;
}

.fav-title{
  font-size:16px;
  margin-bottom:12px;
}

.fav-row{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding-bottom:6px;
}

.fav-card{
  min-width:120px;
}

.fav-card img{
  width:120px;
  height:80px;
  object-fit:cover;
  border:1px solid rgba(255,0,0,0.4);
}

.fav-name{
  margin-top:6px;
  font-size:13px;
}

/* ===== MOBILE (PORTRAIT) ===== */
@media (max-width: 700px){

  .profile{
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-top:-40px;
  }

  .actions{
    margin:10px 0 0;
    flex-wrap:wrap;
    justify-content:center;
  }

  .avatar{
    width:90px;
    height:90px;
  }

  .name{
    font-size:20px;
  }

  .tabs{
    justify-content:center;
  }

  .fav-card{
    min-width:100px;
  }

  .fav-card img{
    width:100px;
    height:70px;
  }
}

.space{
  height:40px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- HEADER -->

  <!-- PROFILE -->
  <div class="profile">
    <img src="profile.webp" class="avatar">

    <div>
      <div class="name">Froylan</div>
      <div class="username">@GutierrezFroy</div>
    </div>

    <div class="actions">
      <a class="btn" href="https://discord.gg/FfgJvX27GZ" target="_blank">
        Join His Server
      </a>

      <a class="btn" href="https://www.roblox.com/users/2921590289/profile" target="_blank">
        Add Friend
      </a>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">43 Friends</div>
    <div class="stat">1 Follower</div>
    <div class="stat">0 Following</div>
  </div>

  <!-- BIO -->
  <div class="bio">
    don't say something you not willing to give it.
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">About</div>
    <div class="tab">Creations</div>
  </div>

  <!-- FAVORITES -->
  <div class="favorites">
    <div class="fav-title">Favorites ></div>

    <div class="fav-row">

      <div class="fav-card">
        <img src="fav-h.webp">
        <div class="fav-name">H</div>
      </div>

      <div class="fav-card">
        <img src="fav-i.webp">
        <div class="fav-name">I</div>
      </div>

      <div class="fav-card">
        <img src="fav-k.webp">
        <div class="fav-name">K</div>
      </div>

      <div class="fav-card">
        <img src="fav-a.webp">
        <div class="fav-name">A</div>
      </div>

      <div class="fav-card">
        <img src="fav-r.webp">

      </div>

      <div class="fav-card">
        <img src="fav-u.webp">
        <div class="fav-name">U</div>
      </div>

    </div>
  </div>

  <div class="space"></div>

</div>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ISFP Definition</title>

<style>
body{
  margin:0;
  padding:40px;
  background:#f5f5f5;
  font-family:Georgia, "Times New Roman", serif;
  display:flex;
  justify-content:center;
}

/* SQUARE BOX */
.box{
  width:500px;
  padding:40px;
  background:#fff;
  border:1px solid #ddd;
}

/* TITLE */
.title{
  font-size:64px;
  font-weight:bold;
  letter-spacing:2px;
}

.acronym{
  font-size:18px;
  margin-left:10px;
}

/* PRONUNCIATION */
.pronounce{
  font-size:18px;
  margin:16px 0;
  font-style:italic;
}

/* DEFINITION */
.definition{
  font-size:20px;
  line-height:1.6;
}

.definition em{
  font-style:italic;
}
</style>
</head>

<body>

<div class="box">

  <div>
    <span class="title">ISFP</span>
    <span class="acronym">[acronym]</span>
  </div>

  <div class="pronounce">
    /in·tro·vert·ed/sen·sing/feel·ing/per·ceiv·ing/
  </div>

  <div class="definition">
    <em>def:</em>
    Seek meaning through personal values, experiences, and self-expression. 
    Live quietly but deeply, guided by emotion and authenticity, 
    appreciating beauty in the present moment rather than rigid structure.
  </div>

</div>

</body>
</html>

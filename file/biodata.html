<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BIODATA</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#ff4d4d;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== TERMINAL STYLE CARD ===== */
.card{
  width:min(92vw, 380px);
  height:min(92vh, 680px);

  border:1px solid #ff0000;
  background:#050000;

  box-shadow:
    0 0 20px #ff0000,
    inset 0 0 40px rgba(255,0,0,0.15);

  padding:16px;
  display:flex;
  flex-direction:column;

  position:relative;
  overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  letter-spacing:3px;
}

.small{
  font-size:10px;
  opacity:.6;
}

.title{
  font-size:20px;
  margin-top:6px;
}

/* ===== PROFILE ===== */
.profile-wrap{
  position:relative;
  margin-top:10px;
}

.profile{
  width:100%;
  height:160px;
  object-fit:cover;
  border:1px solid #ff0000;
}

/* ===== STICKER BUTTON ===== */
.sticker{
  position:absolute;
  right:8px;
  bottom:-10px;
  width:60px;
  cursor:pointer;
  z-index:5;

  /* IMPORTANT FIX */
  pointer-events:auto;
}

.sticker:hover{
  transform:scale(1.1);
}

/* ===== CONTENT ===== */
.content{
  margin-top:12px;
  font-size:12px;
  line-height:1.5;
  white-space:pre-wrap;

  flex:1;
  overflow:hidden;
}

/* ===== BACK ===== */
.back{
  text-align:center;
  font-size:12px;
  margin-top:6px;
  cursor:pointer;
  opacity:.6;
}

.back:hover{
  opacity:1;
}

/* ===== PROTECTION ===== */
*{
  -webkit-user-select:none;
  user-select:none;
}

img{
  -webkit-user-drag:none;
  user-drag:none;
  pointer-events:none;
}

/* EXCEPTION FOR BUTTON */
.sticker{
  pointer-events:auto !important;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="small">[ CLASSIFIED FILE — UNAUTHORIZED VIEW ]</div>
    <div class="title">BIODATA</div>
  </div>

  <div class="profile-wrap">
    <img src="profile.jpg" class="profile">
    <img src="stickers.png" class="sticker" id="toggleBtn">
  </div>

  <div class="content" id="content"></div>

  <div class="back" onclick="window.location.href='https://simplefroylan.space'">
    ← BACK
  </div>

</div>

<script>

// ===== BLOCK RIGHT CLICK =====
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

// ===== TEXT =====
const biodataText = `Nama            : Froylán bukan mpruy
Zodiak          : Libra

Makanan Fav     : Somebody Son's ass
Minuman Fav     : Americano
Kesibukan       : tidur and goonung

Tanggal Lahir   : gatau lupa

Hobi            : Masak, nyanyi, ngehalu, denger lagu, ribut sama A.I.

Domisili        : Heisenberg
Nomor Rumah     : 67 Six Seven
Boneka Favorit  : Teddy

Nama Ortu       : g kenal

No. Rek         : 69 666 67

Pw Email        : 123456789

Pin             : ilfroy

Mie             : ga suka mie`;

const messageText = `I Just realized I'm not, I'm not even everyone's favorite friend.
People may tell me, I mean, a lot to them that I'm special.

But deep down I know there's always someone they'll choose over me.
Someone they talk to more someone, they run to first.
Someone they think of before.

And that's okay, even if it hurts sometimes.

I used to wonder what's wrong with me.
Why I'm never the first option, but now I understand that not being chosen
doesn't mean I'm not enough.

It just means people have their own people.

And that's something I can't control.

I still have a good heart.
I still care.
Deeply.

And even if I'm not their favorite,
I'll still be kind.

I don't need to be everyone's first choice
to know that I'm worth choosing.`;

// ===== TYPE EFFECT =====
let typingInterval;

function typeText(text){
  clearInterval(typingInterval);

  const el = document.getElementById("content");
  el.textContent = "";

  let i = 0;

  typingInterval = setInterval(()=>{
    el.textContent += text[i] || "";
    i++;

    if(i >= text.length){
      clearInterval(typingInterval);
    }
  }, 15);
}

// ===== TOGGLE =====
let isBio = true;

document.getElementById("toggleBtn").addEventListener("click", () => {

  isBio = !isBio;

  if(isBio){
    typeText(biodataText);
  } else {
    typeText(messageText);
  }

});

// ===== INIT =====
typeText(biodataText);

</script>

</body>
</html>

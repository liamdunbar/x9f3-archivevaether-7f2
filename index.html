<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>System Terminal — Internal Log</title>

  <meta name="description" content="Access granted. Explore a terminal-style system of internal logs, layered thoughts, and hidden entries.">

  <meta property="og:title" content="System Terminal — Internal Log">
  <meta property="og:description" content="Enter the system. Navigate through levels, logs, and fragmented thoughts.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://simplefroylan.space/">
  <meta property="og:image" content="https://simplefroylan.space/preview.jpg">

  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="style.css">

  <style>
    img{
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
      pointer-events:none;
    }

    #warnBox{
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      background:#000;
      color:#ff3b3b;
      border:1px solid #ff3b3b;
      padding:10px 18px;
      font-size:13px;
      opacity:0;
      pointer-events:none;
      transition:opacity .3s ease;
      z-index:9999;
    }
  </style>
</head>

<body>

<h1 style="display:none;">
System Terminal Internal Log Interactive Experience
</h1>

<section class="state">
  <div class="crt terminal flicker">

    <div class="terminal-main">
      <div class="terminal-header">SYSTEM TERMINAL</div>
      <div class="terminal-body" id="terminalBody"></div>
    </div>

    <div class="right-panel">
      <div class="entry unlocked" data-view="level1">LEVEL 1</div>
      <div class="entry unlocked" data-view="level2a">LEVEL 2 — RESEARCH ZONE 1</div>
      <div class="entry unlocked" data-view="level2b">LEVEL 2 — RESEARCH ZONE 2</div>
      <div class="entry denied" data-view="level3">LEVEL 3</div>
      <div class="entry unlocked" data-view="level4">LEVEL 4 — UPDATES</div>
      <div class="entry unlocked" data-view="revelation">LEVEL 4 — REVELATION</div>
      <div class="entry unlocked" data-view="chronicles">LEVEL 4 — CHRONICLES</div>
    </div>

    <div class="footer">AREA AUTHORIZED</div>

    <div id="warnBox">ACCESS DENIED — UNAUTHORIZED ACTION</div>

  </div>
</section>

<audio id="clickSound">
  <source src="click.wav" type="audio/wav">
</audio>

<audio id="errorSound">
  <source src="error.wav" type="audio/wav">
</audio>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const warn = document.getElementById("warnBox");
  const errorSound = document.getElementById("errorSound");
  let timeout;

  function showWarning(){
    warn.style.opacity = 1;

    if(errorSound){
      errorSound.currentTime = 0;
      errorSound.volume = 0.25;
      errorSound.play();
    }

    clearTimeout(timeout);
    timeout = setTimeout(()=>{
      warn.style.opacity = 0;
    },2000);
  }

  document.addEventListener("contextmenu", e => {
    e.preventDefault();
    showWarning();
  });

  document.addEventListener("dragstart", e => {
    if(e.target.tagName === "IMG"){
      e.preventDefault();
      showWarning();
    }
  });

});
</script>

<script src="script.js"></script>

</body>
</html>

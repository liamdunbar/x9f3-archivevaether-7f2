<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>remnant-003</title>

<style>
body {
  margin: 0;
  background: black;
  color: #8a0000;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.panel {
  width: 90%;
  max-width: 420px;
  border: 1px solid rgba(255,0,0,0.2);
  padding: 20px;
  background: rgba(0,0,0,0.95);
}

.header {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 15px;
}

.content {
  opacity: 0.5;
  transition: 0.5s;
}

img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  display: block;
  margin-bottom: 10px;
  filter: blur(10px);
  transition: 0.6s;
}

.lock {
  margin-top: 20px;
  border-top: 1px solid rgba(255,0,0,0.2);
  padding-top: 10px;
}

input {
  width: 100%;
  background: black;
  border: none;
  border-bottom: 1px solid #8a0000;
  color: #8a0000;
  outline: none;
  padding: 6px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid #8a0000;
  color: #8a0000;
  font-family: monospace;
}

.system {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 10px;
}

.denied { color: red; }
.granted { color: #00ff9c; }

/* Back button smaller + subtle */
.back {
  margin-top: 15px;
  font-size: 11px;
  opacity: 0.6;
  border: none;
  text-align: left;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="panel">

  <div class="header">
    FILE: remnant-003<br>
    STATUS: RESTRICTED
  </div>

  <div class="content" id="content">
    <img src="satrya.webp" id="img">

    <div id="name">Name: S■■■■</div>
    <div id="user">Username: s◇◇◇◇</div>

    <div id="desc" style="margin-top:10px; font-size:12px;">
      Partial data recovered...
    </div>
  </div>

  <div class="lock">
    <input type="password" id="pass" placeholder="authorization key required">
    <button onclick="checkPass()">EXECUTE</button>
    <div id="msg" class="system"></div>
  </div>

  <!-- BACK BUTTON (always available) -->
  <button class="back" onclick="goBack()">← return</button>

</div>

<script>
const correct = "leftunsaid";

const input = document.getElementById("pass");
const msg = document.getElementById("msg");

function checkPass() {

  if (input.value === correct) {

    input.disabled = true;

    msg.textContent = "AUTHORIZING...";
    msg.className = "system";

    setTimeout(() => {
      msg.textContent = "DECRYPTING DATA...";
    }, 700);

    setTimeout(() => {
      msg.textContent = "LOADING RECORD...";
    }, 1400);

    setTimeout(() => {

      msg.textContent = "ACCESS GRANTED";
      msg.className = "system granted";

      document.getElementById("img").style.filter = "none";

      document.getElementById("name").textContent = "Name: Satrya";
      document.getElementById("user").textContent = "Username: satrya_03";

      document.getElementById("desc").innerHTML = `
        Full record loaded.<br><br>
        Subject shows signs of emotional suppression.<br>
        Avoids external interaction.<br>
        Presence: low, but persistent.<br><br>
        Notes: Not gone. Just hidden.
      `;

    }, 2100);

  } else {
    msg.textContent = "ACCESS DENIED";
    msg.className = "system denied";
  }
}

// keyboard support
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkPass();
  }
});

// BACK FUNCTION
function goBack() {
  window.history.back();
}
</script>

</body>
</html>

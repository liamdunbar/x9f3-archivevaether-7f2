<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Roblox GutierrezFroy's Profile</title>

<meta name="description" content="GutierrezFroy is one of the millions creating and exploring Roblox.">
<meta property="og:title" content="Roblox GutierrezFroy's Profile">

<style>
body{
  margin:0;
  background:#000;
  font-family:monospace;
  color:#ff4d4d;
}

/* subtle scanlines */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.03) 0px,
    transparent 2px
  );
  pointer-events:none;
}

/* container */
.wrap{
  max-width:1000px;
  margin:auto;
}

/* HEADER (roblox style) */
.header{
  height:220px;
  background:url("header.webp") center/cover no-repeat;
  border-bottom:1px solid #ff0000;
  box-shadow:0 0 20px #ff0000;
}

/* PROFILE SECTION */
.profile{
  display:flex;
  align-items:flex-end;
  gap:16px;
  padding:0 20px;
  margin-top:-60px;
}

/* avatar */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid #ff0000;
  background:#000;
  object-fit:cover;
}

/* name */
.name{
  font-size:26px;
  text-shadow:0 0 8px #ff0000;
}

.username{
  font-size:14px;
  opacity:.7;
}

/* buttons */
.actions{
  margin-left:auto;
  display:flex;
  gap:12px;
}

.btn{
  border:1px solid #ff0000;
  padding:10px 16px;
  text-decoration:none;
  color:#ff4d4d;
  transition:.2s;
}

.btn:hover{
  background:#ff0000;
  color:#000;
}

/* stats */
.stats{
  display:flex;
  gap:12px;
  padding:12px 20px;
}

.stat{
  border:1px solid rgba(255,0,0,0.3);
  padding:6px 12px;
  font-size:13px;
}

/* bio */
.bio{
  padding:0 20px;
  font-size:14px;
  opacity:.8;
}

/* tabs */
.tabs{
  display:flex;
  gap:40px;
  padding:20px;
  border-bottom:1px solid rgba(255,0,0,0.3);
}

.tab{
  cursor:pointer;
  opacity:.6;
}

.tab.active{
  opacity:1;
  border-bottom:2px solid #ff0000;
}

/* bottom spacing */
.space{
  height:40px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="header"></div>

  <!-- PROFILE -->
  <div class="profile">

    <img src="profile.webp" class="avatar">

    <div>
      <div class="name">Froylan</div>
      <div class="username">@GutierrezFroy</div>
    </div>

    <div class="actions">
      <a class="btn" href="https://discord.gg/FfgJvX27GZ" target="_blank">
        Join His Server
      </a>

      <a class="btn" href="https://www.roblox.com/users/2921590289/profile" target="_blank">
        Add Friend
      </a>
    </div>

  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">43 Friends</div>
    <div class="stat">1 Follower</div>
    <div class="stat">0 Following</div>
  </div>

  <!-- BIO -->
  <div class="bio">
    don't say something you not willing to give it.
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">About</div>
    <div class="tab">Creations</div>
  </div>

  <div class="space"></div>

</div>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BIODATA — FILE</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020000;
  font-family:monospace;
  color:#ff4d4d;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== MAIN CONTAINER ===== */
.card{
  width:min(92vw, 380px);
  aspect-ratio:9 / 16;

  background:#040000;
  border:1px solid #ff0000;

  box-shadow:
    0 0 25px rgba(255,0,0,0.4),
    inset 0 0 60px rgba(255,0,0,0.08);

  padding:16px;

  position:relative;
  overflow:hidden;
}

/* ===== SCAN LINE ===== */
.scan{
  position:absolute;
  width:100%;
  height:2px;
  background:rgba(255,0,0,0.3);
  top:0;
  animation:scanMove 4s linear infinite;
}

@keyframes scanMove{
  0%{top:0}
  100%{top:100%}
}

/* ===== HEADER ===== */
.header{
  font-size:12px;
  opacity:0.6;
  margin-bottom:6px;
}

.title{
  text-align:center;
  font-size:22px;
  letter-spacing:6px;
  margin-bottom:10px;
}

/* ===== IMAGE ===== */
.img-wrap{
  position:relative;
}

.profile{
  width:100%;
  height:190px;
  object-fit:cover;
  border:1px solid #ff0000;
  filter:contrast(1.1) brightness(0.9);
}

/* sticker like intrusion */
.sticker{
  position:absolute;
  right:-8px;
  bottom:-8px;
  width:85px;
  transform:rotate(-10deg);

  filter:
    drop-shadow(0 0 10px red)
    saturate(1.2);
}

/* ===== CONTENT ===== */
.content{
  margin-top:12px;
  font-size:12px;
  line-height:1.6;
}

/* lines */
.row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid rgba(255,0,0,0.2);
}

/* labels */
.label{
  opacity:0.5;
}

/* values */
.value{
  text-align:right;
  max-width:55%;
}

/* ===== GLITCH TEXT ===== */
.glitch{
  position:relative;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  width:100%;
  overflow:hidden;
}

.glitch::before{
  color:#ff0000;
  top:-1px;
  animation:glitch 1s infinite;
}

.glitch::after{
  color:#ff9999;
  top:1px;
  animation:glitch 1s infinite reverse;
}

@keyframes glitch{
  0%{clip-path:inset(0 0 80% 0)}
  50%{clip-path:inset(40% 0 20% 0)}
  100%{clip-path:inset(0 0 60% 0)}
}

/* ===== BACK BUTTON ===== */
.back{
  position:absolute;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
}

.back button{
  background:transparent;
  border:none;
  color:#ff4d4d;
  font-size:12px;
  cursor:pointer;
  opacity:0.7;
}

.back button:hover{
  opacity:1;
  text-decoration:underline;
}

/* ===== CRT ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.04),
    rgba(255,0,0,0.04) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* ===== BLOCK ===== */
img{
  user-select:none;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="card">

  <div class="scan"></div>

  <div class="header">[ CLASSIFIED FILE — UNAUTHORIZED VIEW ]</div>

  <div class="title glitch" data-text="BIODATA">BIODATA</div>

  <div class="img-wrap">
    <img src="profile.jpg" class="profile">
    <img src="stickers.png" class="sticker">
  </div>

  <div class="content">

    <div class="row"><div class="label">Nama</div><div class="value">Froylán bukan mpruy</div></div>
    <div class="row"><div class="label">Zodiak</div><div class="value">Libra</div></div>

    <div class="row"><div class="label">Makanan</div><div class="value">Somebody Son's ass</div></div>
    <div class="row"><div class="label">Minuman</div><div class="value">Americano</div></div>
    <div class="row"><div class="label">Kesibukan</div><div class="value">tidur & gooning</div></div>

    <div class="row"><div class="label">Tanggal</div><div class="value">gatau lupa</div></div>
    <div class="row"><div class="label">Hobi</div><div class="value">ngehalu, nyanyi, ribut sama AI</div></div>

    <div class="row"><div class="label">Domisili</div><div class="value">Heisenberg</div></div>
    <div class="row"><div class="label">Rumah</div><div class="value">67 Six Seven</div></div>

    <div class="row"><div class="label">Rekening</div><div class="value">69 666 67</div></div>
    <div class="row"><div class="label">Pin</div><div class="value">ilfroy</div></div>

  </div>

  <div class="back">
    <button onclick="goBack()">← return</button>
  </div>

</div>

<script>
function goBack(){
  window.location.href = "https://simplefroylan.space";
}

document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => {
  if(e.target.tagName === "IMG") e.preventDefault();
});
</script>

</body>
</html>

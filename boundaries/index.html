<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABSOLUTE SYSTEM — BOUNDARY PROTOCOL</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100dvh;
  background:#000;
  color:#f2e86d;
  font-family:monospace;
  overflow-x:hidden;
}

/* CRT */
.crt{
  position:fixed;
  inset:0;
  background:#040404;
}

.crt::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* TERMINAL */
.terminal{
  position:relative;
  max-width:950px;
  margin:40px auto;
  padding:30px;
  border:1px solid #f2e86d;
  background:rgba(0,0,0,0.93);
  box-shadow:0 0 35px rgba(242,232,109,0.08);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #f2e86d;
  padding-bottom:10px;
  margin-bottom:18px;
}

.back{
  color:#6aa6ff;
  text-decoration:underline;
  font-size:12px;
}

.title{
  font-size:18px;
  margin-bottom:20px;
  font-weight:bold;
  letter-spacing:1px;
}

.body{
  line-height:1.9;
  font-size:14px;
}

.section{
  margin-top:24px;
  margin-bottom:8px;
  color:#fff;
  font-weight:bold;
}

.warn{
  color:#ff5d5d;
}

.safe{
  color:#8dffb2;
}

.soft{
  color:#9a9a9a;
}

.system{
  color:#6aa6ff;
}

.final{
  margin-top:28px;
  color:#ffffff;
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:20px;
}

/* glitch */
.glitch{
  animation:glitch 0.15s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(-1px,1px);}
  50%{transform:translate(1px,-1px);}
  75%{transform:translate(-1px,-1px);}
  100%{transform:translate(1px,1px);}
}

/* mobile */
@media(max-width:600px){

  .terminal{
    margin:14px;
    padding:18px;
  }

  .title{
    font-size:15px;
  }

  .body{
    font-size:12px;
    line-height:1.8;
  }

  .header{
    gap:8px;
    flex-direction:column;
    align-items:flex-start;
  }

}
</style>
</head>

<body>

<div class="crt"></div>

<div class="terminal">

<div class="header">
  <span>ABSOLUTE SYSTEM — BOUNDARY PROTOCOL</span>
  <a class="back" href="https://simplefroylan.space">← back</a>
</div>

<div class="title glitch">
ENTRY — STABILIZATION BEFORE CONNECTION
</div>

<div class="body" id="typed"></div>

</div>

<script>

const content = `

<span class="system">[SYSTEM]</span> Emotional overload detected.<br>
<span class="system">[SYSTEM]</span> Attachment response currently unstable.<br>
<span class="system">[SYSTEM]</span> Temporary protection protocol activated.<br><br>

<div class="section">BOUNDARIES FOR OTHER PEOPLE</div>

<span class="warn">• Don’t give me relationship-level affection while calling it “just friendship.”</span><br>

<span class="warn">• Don’t treat me like an emotional partner if you only want temporary comfort.</span><br>

<span class="warn">• Don’t say things you can’t consistently maintain.</span><br>

<span class="warn">• Don’t feed attachment if you already know you can’t stay.</span><br>

<span class="warn">• Don’t make me emotionally safe one day and emotionally disposable the next.</span><br><br>

• If you’re confused about your feelings, figure them out before pulling me deeper.<br>

• If you only want casual attention, say it honestly.<br>

• If you cannot communicate clearly, don’t create emotional dependency accidentally.<br><br>

<div class="section">BOUNDARIES FOR MYSELF</div>

<span class="safe">• I will stop treating kindness like destiny.</span><br>

<span class="safe">• I will stop making one person my emotional home too quickly.</span><br>

<span class="safe">• I will stop building futures with people I barely know.</span><br>

<span class="safe">• I will stop confusing affection with permanent safety.</span><br>

<span class="safe">• I will slow down before attachment becomes emotional survival.</span><br><br>

• I will not chase reassurance every time someone becomes quiet.<br>

• I will not force clarity from emotionally confused people.<br>

• I will not sacrifice my mental stability just to keep connection alive.<br>

• I will remember that people are humans, not cures for loneliness.<br><br>

<div class="section">CURRENT SYSTEM REALIZATION</div>

<span class="soft">• My heart is not evil. It is just starving for safety.</span><br>

<span class="soft">• My attachment is not proof of destiny.</span><br>

<span class="soft">• My feelings are real, but they are not always instructions.</span><br>

<span class="soft">• Wanting love is human. Depending on it for survival is dangerous.</span><br><br>

<div class="final">

I do not need to become cold.<br>
I need to become steady.<br><br>

Not every person who comforts me is meant to become my future.<br><br>

For now, I choose stabilization over intensity.<br>
Peace over emotional chaos.<br>
Reality over fantasy.<br><br>

<span class="system">[SYSTEM]</span> Boundary protocol active.<br>
<span class="system">[SYSTEM]</span> User protection prioritized.<br>

</div>

`;

const target = document.getElementById("typed");

let i = 0;
const speed = 12;

function type(){

  if(i < content.length){

    target.innerHTML = content.slice(0,i);
    i++;

    setTimeout(type,speed);

  }

}

type();

</script>

</body>
</html>

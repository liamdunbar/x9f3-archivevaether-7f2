<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INFP Definition</title>

<style>
body{
  margin:0;
  padding:0;
  background:#f5f5f5;
  font-family:Georgia, "Times New Roman", serif;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:520px;
  height:520px;

  background:#fff;
  border:1px solid #ddd;

  padding:60px;

  display:flex;
  flex-direction:column;
  justify-content:center;
}

.title{
  font-size:64px;
  font-weight:bold;
  letter-spacing:2px;
}

.acronym{
  font-size:18px;
  margin-left:10px;
}

.pronounce{
  font-size:18px;
  margin:18px 0;
  font-style:italic;
}

.definition{
  font-size:20px;
  line-height:1.7;
}

.definition em{
  font-style:italic;
}
</style>
</head>

<body>

<div class="box">

  <div>
    <span class="title">INFP</span>
    <span class="acronym">[acronym]</span>
  </div>

  <div class="pronounce">
    /in·tro·vert·ed/in·tu·i·tion/feel·ing/per·ceiv·ing/
  </div>

  <div class="definition">
    <em>def:</em>
    Seek meaning through inner values, imagination, and emotional truth. 
    Quietly idealistic, often living between reality and possibility, 
    guided by a deep desire to understand themselves and stay true to who they are.
  </div>

</div>

</body>
</html>
